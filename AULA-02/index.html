<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="icon" href="https://eusouflamengo.com.br/wp-content/uploads/2025/01/Neymar-Flamengo-2.jpg" />
  </head>
  <body>
    <h1> TABELA INCRÍVEL</h1>
    <!-- criando uma tabela -->
    <table border = "10">
    <!-- cabeçalho da tabela-->
        <thead>
            <tr>
                <th>NOME:</th>
                <th>ITEM:</th>
                <th>QUANTIDADE:</th>
                <th>PREÇO:</th>
                <th>TAMANHO:</th>
                <th>PESO:</th>
            </tr>
        </thead>
        <!-- Corpo da tabela -->
        <tbody>
            <!-- cria uma linha -->
            <tr> 
                <!-- Cria uma coluna -->
                <td>CARONE</td>
                <td>FEIJAO</td>
                <td>5</td>
                <td>R$ 6.7</td>
                <td>0.7MM</td>
                <td>&clubs;</td>

            </tr>
            <tr>
                <td>Kaio</td>
                <td>UVA</td>
                <td>3</td>
                <td>R$ 2.5</td>
                <td>1CM</td>
                <td>&Omega;</td>
            </tr>
            <tr>
                <td>Alice</td>
                <td>TOMATE</td>
                <td>6</td>
                <td>R$ 3.2</td>
                <td>8CM</td>
                <td>&sigma;</td>
            </tr>
            
        </tbody>
        <tfoot>
            <tr>
            <td colspan="6">SUPERMERCADO CARONE &copy;</td>
            </tr>
        </tfoot>


    </table>
  </body>
</html>
